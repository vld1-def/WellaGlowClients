<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wella Glow | Мій кабінет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #050505;
            --card: #111113;
            --accent: #f43f5e;
            --emerald: #10b981;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0;
            letter-spacing: -0.01em;
        }

        .glass-panel {
            background: rgba(17, 17, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            width: 100%;
        }

        .status-badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.05em;
        }

        i, span, p, h1, h2, h3, h4, label, button, input { font-style: normal !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }

        /* Вимикаємо скролбар, щоб було чисто */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Тільки для мобільних дозволяємо свайп, на компі краще тільки через кнопки */
@media (min-width: 1024px) {
    #main-scroller { overflow-x: hidden; }
}

/* Компактна лояльність для мобілки */
.loyalty-card-mobile {
    padding: 1rem !important;
    margin-bottom: 1rem !important;
}
.loyalty-card-mobile h3 { font-size: 1.25rem !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Стиль активної кнопки як на твоєму скріншоті */
        .nav-active {
            background: rgba(244, 63, 94, 0.1) !important;
            color: #f43f5e !important;
        }
        .nav-inactive {
            color: #52525b;
        }
        
        /* Щоб контент не стрибав */
        section { scroll-snap-align: center; }
        /* Контейнер для заголовка, щоб вони були на одній лінії */
.section-header-container {
    height: 80px; /* Фіксована висота для всіх заголовків */
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 2rem; /* mb-8 */
}

/* Однаковий відступ для всіх секцій */
#main-scroller section {
    padding-top: 2rem !important; 
}
        #main-scroller {
    scroll-behavior: smooth;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; /* для плавності на iPhone */
}
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <!-- SIDEBAR: Знизу на мобільних, збоку на десктопі -->
<!-- SIDEBAR / TABBAR -->
<aside class="fixed bottom-0 lg:top-0 left-0 z-[100] w-full lg:w-64 h-20 lg:h-full bg-black/80 backdrop-blur-2xl border-t lg:border-r border-white/5 flex flex-row lg:flex-col shadow-2xl">
    <div class="hidden lg:flex p-8 flex-col">
        <h1 class="text-xl font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
        <p class="text-[9px] text-rose-500 font-bold tracking-[0.4em] mt-1">studio</p>
    </div>

    <!-- Кнопки в меню стали ширшими для пальця (flex-1) -->
    <nav class="flex flex-row lg:flex-col flex-1 px-2 lg:px-4 items-center lg:items-stretch justify-around lg:justify-start lg:space-y-2">
        <button onclick="window.scrollToPage(0)" id="nav-profile" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-3 lg:p-4 transition rounded-2xl">
            <i class="fa-solid fa-circle-user text-xl lg:text-sm"></i> 
            <span class="text-[10px] lg:text-xs uppercase font-black tracking-widest">Профіль</span>
        </button>

        <button onclick="window.scrollToPage(1)" id="nav-booking" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-3 lg:p-4 transition rounded-2xl">
            <i class="fa-solid fa-calendar-plus text-xl lg:text-sm"></i> 
            <span class="text-[10px] lg:text-xs uppercase font-black tracking-widest">Запис</span>
        </button>

        <button onclick="window.scrollToPage(2)" id="nav-bonuses" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-3 lg:p-4 transition rounded-2xl">
            <i class="fa-solid fa-gift text-xl lg:text-sm"></i> 
            <span class="text-[10px] lg:text-xs uppercase font-black tracking-widest">Бонуси</span>
        </button>
    </nav>
</aside>

 <!-- ОСНОВНИЙ КОНТЕЙНЕР ДЛЯ ГОРТАННЯ -->
    <main id="main-scroller" class="flex-1 flex overflow-x-auto snap-x snap-mandatory no-scrollbar scroll-smooth">
        
        <!-- СТОРІНКА 1: ПРОФІЛЬ -->
        <section class="w-screen flex-shrink-0 snap-center p-6 pb-24 overflow-y-auto" id="page-profile">
            <!-- Сюди JS вставить вміст профілю -->
            <p class="text-zinc-500 animate-pulse uppercase font-black text-[10px] tracking-widest text-center mt-20">Завантаження...</p>
        </section>

        <!-- СТОРІНКА 2: ЗАПИС -->
        <section class="w-screen flex-shrink-0 snap-center p-6 pb-24 overflow-y-auto" id="page-booking">
            <!-- Сюди JS вставить форму запису -->
        </section>

        <!-- СТОРІНКА 3: БОНУСИ -->
        <section class="w-screen flex-shrink-0 snap-center p-6 pb-24 overflow-y-auto" id="page-bonuses">
            <!-- Сюди JS вставить вміст бонусів -->
        </section>

    </main>

    <!-- НИЖНЄ МЕНЮ (TAB BAR) -->
    <nav class="fixed bottom-4 left-4 right-4 h-16 glass-panel rounded-2xl flex items-center justify-around z-[100] border border-white/5 shadow-2xl">
        <button onclick="window.scrollToPage(0)" id="btn-profile" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300">
            <i class="fa-solid fa-circle-user text-lg"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Профіль</span>
        </button>
        
        <button onclick="window.scrollToPage(1)" id="btn-booking" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300">
            <i class="fa-solid fa-calendar-plus text-lg"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Запис</span>
        </button>

        <button onclick="window.scrollToPage(2)" id="btn-bonuses" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300">
            <i class="fa-solid fa-gift text-lg"></i>
            <span class="text-[9px] font-black uppercase tracking-widest">Бонуси</span>
        </button>
    </nav>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
