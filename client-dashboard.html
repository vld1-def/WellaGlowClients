<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wella Glow | Мій кабінет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #050505;
            --card: #111113;
            --accent: #f43f5e;
            --emerald: #10b981;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0;
            letter-spacing: -0.01em;
        }

        .glass-panel {
            background: rgba(17, 17, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            width: 100%;
        }

        .status-badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.05em;
        }

        i, span, p, h1, h2, h3, h4, label, button, input { font-style: normal !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }

        /* Вимикаємо скролбар, щоб було чисто */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Тільки для мобільних дозволяємо свайп, на компі краще тільки через кнопки */
@media (min-width: 1024px) {
    #main-scroller { overflow-x: hidden; }
}

/* Компактна лояльність для мобілки */
.loyalty-card-mobile {
    padding: 1rem !important;
    margin-bottom: 1rem !important;
}
.loyalty-card-mobile h3 { font-size: 1.25rem !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Стиль активної кнопки як на твоєму скріншоті */
        .nav-active {
            background: rgba(244, 63, 94, 0.1) !important;
            color: #f43f5e !important;
        }
        .nav-inactive {
            color: #52525b;
        }
        
        /* Щоб контент не стрибав */
        section { scroll-snap-align: center; }
        /* Контейнер для заголовка, щоб вони були на одній лінії */
.section-header-container {
    height: 80px; /* Фіксована висота для всіх заголовків */
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 2rem; /* mb-8 */
}

/* Однаковий відступ для всіх секцій */
#main-scroller section {
    padding-top: 2rem !important; 
}
        #main-scroller {
    scroll-behavior: smooth;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; /* для плавності на iPhone */
}
    </style>
</head>
<body class="flex min-h-screen bg-[#050505] text-[#e2e8f0]">

    <!-- НАВІГАЦІЯ: Збоку на ПК, Знизу на мобільних -->
    <aside class="fixed bottom-0 lg:top-0 left-0 z-[100] w-full lg:w-64 h-16 lg:h-full bg-black/80 backdrop-blur-xl border-t lg:border-r border-white/5 flex flex-row lg:flex-col shadow-2xl transition-all">
        <div class="hidden lg:flex p-6 flex-col">
            <h1 class="text-lg font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
            <p class="text-[8px] text-rose-500 font-bold tracking-[0.4em] uppercase opacity-80 mt-1">studio</p>
        </div>

        <nav class="flex flex-row lg:flex-col flex-1 px-2 lg:px-4 items-center lg:items-stretch justify-around lg:justify-start lg:space-y-4">
            <a href="#" id="nav-profile" onclick="window.renderProfilePage()" class="flex flex-col lg:flex-row items-center gap-1 lg:gap-3 p-2 lg:p-3 transition text-zinc-400 group">
                <i class="fa-solid fa-circle-user text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-bold tracking-widest">Профіль</span>
            </a>
            <a href="#" id="nav-booking" onclick="window.renderBookingPage()" class="flex flex-col lg:flex-row items-center gap-1 lg:gap-3 p-2 lg:p-3 transition text-zinc-400 group">
                <i class="fa-solid fa-calendar-plus text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-bold tracking-widest">Запис</span>
            </a>
            <a href="#" id="nav-bonuses" onclick="window.renderBonusPage()" class="flex flex-col lg:flex-row items-center gap-1 lg:gap-3 p-2 lg:p-3 transition text-zinc-400 group">
                <i class="fa-solid fa-gift text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-bold tracking-widest">Бонуси</span>
            </a>
        </nav>
    </aside>

    <!-- ГОЛОВНИЙ КОНТЕНТ -->
    <main class="flex-1 ml-0 lg:ml-64 p-5 lg:p-10 pb-24 lg:pb-10">
        <!-- Сюди JS вставляє контент -->
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
