<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wella Glow | Мій кабінет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; --accent: #f43f5e; --amber: #f59e0b; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; letter-spacing: -0.01em; }
        .glass-panel { background: rgba(17, 17, 19, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        i, span, p, h1, h2, h3, h4, label, button { font-style: normal !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-16 lg:w-64 bg-black/50 border-r border-white/5 flex flex-col fixed h-full z-50">
        <div class="p-6"><h1 class="text-lg font-extrabold text-rose-500 uppercase tracking-tighter">Glow App</h1></div>
        <nav class="flex-1 px-4 space-y-4 mt-4">
            <a href="#" class="flex items-center gap-3 p-3 text-white border-l-2 border-rose-500 bg-rose-500/5 font-bold"><i class="fa-solid fa-user-heart"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Профіль</span></a>
            <a href="client-booking.html" class="flex items-center gap-3 p-3 text-zinc-400 hover:text-white transition"><i class="fa-solid fa-calendar-plus"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Записатись</span></a>
        </nav>
        <div class="p-6 border-t border-white/5">
            <button onclick="logout()" class="text-zinc-600 hover:text-rose-500 transition text-[10px] font-black uppercase tracking-widest">Вийти</button>
        </div>
    </aside>

    <main class="flex-1 ml-16 lg:ml-64 p-5 lg:p-10">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-extrabold text-white tracking-tight">Привіт, <span id="clientFirstName" class="text-rose-500">Гість</span>! ✨</h2>
                <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest mt-2">Твій кабінет лояльності</p>
            </div>
            <div id="loyaltyStatus" class="px-4 py-2 bg-amber-500/10 border border-amber-500/20 rounded-xl">
                <span class="text-[10px] font-black text-amber-500 uppercase tracking-widest">Статус: <span id="statusName">Silver</span></span>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <!-- БОНУСИ -->
                <div class="glass-panel p-8 rounded-[2.5rem] relative overflow-hidden">
                    <div class="absolute -right-10 -top-10 w-32 h-32 bg-rose-500/10 rounded-full blur-3xl"></div>
                    <p class="text-[10px] text-zinc-500 uppercase font-black tracking-widest mb-2">Мій баланс</p>
                    <h3 class="text-4xl font-black text-white"><span id="userBonuses">0</span> <span class="text-sm text-zinc-600">балів</span></h3>
                    <button onclick="location.href='client-booking.html'" class="neo-gradient w-full py-4 rounded-2xl text-[10px] font-black uppercase tracking-[0.2em] text-white mt-8 shadow-xl">Записатись зараз</button>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <!-- НАЙБЛИЖЧИЙ ЗАПИС -->
                <div id="nextAppointmentBox" class="hidden p-6 rounded-[2.5rem] bg-emerald-500/5 border border-emerald-500/20">
                    <h4 class="text-[10px] font-black text-emerald-500 uppercase tracking-widest mb-4">Наступний візит</h4>
                    <div class="flex justify-between items-center">
                        <div class="flex gap-6 items-center">
                            <div class="text-center"><p id="nextDay" class="text-2xl font-black text-white">--</p><p id="nextMonth" class="text-[10px] text-zinc-500 font-bold uppercase">---</p></div>
                            <div class="h-10 w-px bg-white/10"></div>
                            <div><p id="nextService" class="text-base font-bold text-white tracking-tight">Завантаження...</p><p id="nextInfo" class="text-[11px] text-zinc-500 font-medium">---</p></div>
                        </div>
                    </div>
                </div>

                <!-- ІСТОРІЯ -->
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h4 class="text-xs font-black text-white uppercase tracking-widest mb-8">Історія моїх візитів</h4>
                    <div id="historyList" class="space-y-6">
                        <!-- Сюди JS вставить історію -->
                    </div>
                </div>

                <!-- ВІДГУКИ -->
                <div class="glass-panel p-8 rounded-[2.5rem]">
                    <h4 class="text-xs font-black text-white uppercase tracking-widest mb-8">Мої відгуки</h4>
                    <div id="myReviewsList" class="space-y-4">
                        <!-- Сюди JS вставить відгуки -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
