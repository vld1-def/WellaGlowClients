<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wella Glow | Мій кабінет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #050505;
            --card: #111113;
            --accent: #f43f5e;
            --emerald: #10b981;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0;
            letter-spacing: -0.01em;
        }

        .glass-panel {
            background: rgba(17, 17, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            width: 100%;
        }

        .status-badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.05em;
        }

        i, span, p, h1, h2, h3, h4, label, button, input { font-style: normal !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }

        /* Вимикаємо скролбар, щоб було чисто */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Тільки для мобільних дозволяємо свайп, на компі краще тільки через кнопки */
@media (min-width: 1024px) {
    #main-scroller { overflow-x: hidden; }
}

/* Компактна лояльність для мобілки */
.loyalty-card-mobile {
    padding: 1rem !important;
    margin-bottom: 1rem !important;
}
.loyalty-card-mobile h3 { font-size: 1.25rem !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Стиль активної кнопки як на твоєму скріншоті */
        .nav-active {
            background: rgba(244, 63, 94, 0.1) !important;
            color: #f43f5e !important;
        }
        .nav-inactive {
            color: #52525b;
        }
        
        /* Щоб контент не стрибав */
        section { scroll-snap-align: center; }
        /* Контейнер для заголовка, щоб вони були на одній лінії */
.section-header-container {
    height: 80px; /* Фіксована висота для всіх заголовків */
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 2rem; /* mb-8 */
}

/* Однаковий відступ для всіх секцій */
#main-scroller section {
    padding-top: 2rem !important; 
}
        #main-scroller {
    scroll-behavior: smooth;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; /* для плавності на iPhone */
}
        // Додай ці класи в injectGlowStyles() всередині стилів
const toastStyles = `
    .toast-container {
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 90%;
        max-width: 400px;
        pointer-events: none;
    }
    .toast-item {
        background: rgba(17, 17, 19, 0.8);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.05);
        padding: 16px 20px;
        border-radius: 20px;
        color: white;
        box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        display: flex;
        align-items: center;
        gap: 12px;
        pointer-events: auto;
        animation: toast-in 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes toast-in {
        from { opacity: 0; transform: translateY(-20px) scale(0.9); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .toast-out {
        animation: toast-out 0.5s forwards;
    }
    @keyframes toast-out {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(0.8); }
    }
`;
    </style>
</head>
<body class="flex flex-col h-screen bg-[#050505] text-[#e2e8f0] overflow-hidden">

    <!-- НАВІГАЦІЯ (Sidebar/Tabbar) -->
    <aside class="fixed bottom-4 left-4 right-4 lg:top-0 lg:left-0 lg:right-auto z-[100] w-auto lg:w-64 h-16 lg:h-full glass-panel rounded-2xl lg:rounded-none bg-black/60 lg:bg-black/40 backdrop-blur-2xl border border-white/5 lg:border-r lg:border-t-0 flex flex-row lg:flex-col shadow-2xl transition-all duration-500">
        <div class="hidden lg:flex p-6 flex-col">
            <h1 class="text-lg font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
            <p class="text-[8px] text-rose-500 font-bold tracking-[0.4em] mt-1">studio</p>
        </div>

        <nav class="flex flex-row lg:flex-col flex-1 px-2 lg:px-4 items-center lg:items-stretch justify-around lg:justify-start lg:space-y-3">
            <button id="nav-profile" onclick="window.scrollToPage(0)" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 lg:p-4 rounded-xl lg:rounded-2xl transition-all duration-300 text-zinc-500">
                <i class="fa-solid fa-circle-user text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-black tracking-widest">Профіль</span>
            </button>
            <button id="nav-booking" onclick="window.scrollToPage(1)" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 lg:p-4 rounded-xl lg:rounded-2xl transition-all duration-300 text-zinc-500">
                <i class="fa-solid fa-calendar-plus text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-black tracking-widest">Запис</span>
            </button>
            <button id="nav-bonuses" onclick="window.scrollToPage(2)" class="flex-1 lg:flex-none flex flex-col lg:flex-row items-center gap-1 lg:gap-4 p-2 lg:p-4 rounded-xl lg:rounded-2xl transition-all duration-300 text-zinc-500">
                <i class="fa-solid fa-gift text-lg lg:text-sm"></i> 
                <span class="text-[9px] lg:text-xs uppercase font-black tracking-widest">Бонуси</span>
            </button>
        </nav>
    </aside>

    <!-- ГОЛОВНИЙ СКРОЛЕР (Для свайпів) -->
    <main id="main-scroller" class="flex-1 flex overflow-x-auto snap-x snap-mandatory no-scrollbar scroll-smooth ml-0 lg:ml-64">
        
        <!-- Секція 1: ПРОФІЛЬ -->
        <section id="page-profile" class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-10 pb-32 overflow-y-auto h-full">
            <p class="text-zinc-600 animate-pulse text-center mt-20 uppercase font-black text-[10px]">Завантаження профілю...</p>
        </section>

        <!-- Секція 2: ЗАПИС -->
        <section id="page-booking" class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-10 pb-32 overflow-y-auto h-full">
        </section>

        <!-- Секція 3: БОНУСИ -->
        <section id="page-bonuses" class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-10 pb-32 overflow-y-auto h-full">
        </section>

    </main>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @media (min-width: 1024px) { #main-scroller { overflow-x: hidden; } } /* Вимикаємо свайп на ПК */
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
