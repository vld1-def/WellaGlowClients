<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wella Glow | Мій кабінет</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        
        :root {
            --bg: #050505;
            --card: #111113;
            --accent: #f43f5e;
            --emerald: #10b981;
            --gold: #fbbf24;
        }

        body { 
            font-family: 'Manrope', sans-serif; 
            background-color: var(--bg); 
            color: #e2e8f0;
            letter-spacing: -0.01em;
        }

        .glass-panel {
            background: rgba(17, 17, 19, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neo-gradient {
            background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%);
        }

        .gold-gradient {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
        }

        .input-dark {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e2e8f0;
            font-size: 11px;
            font-weight: 600;
            padding: 10px 14px;
            border-radius: 12px;
            outline: none;
            width: 100%;
        }

        .status-badge {
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            padding: 3px 8px;
            border-radius: 5px;
            letter-spacing: 0.05em;
        }

        i, span, p, h1, h2, h3, h4, label, button, input { font-style: normal !important; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #1e1e21; border-radius: 10px; }

        /* Вимикаємо скролбар, щоб було чисто */
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

/* Тільки для мобільних дозволяємо свайп, на компі краще тільки через кнопки */
@media (min-width: 1024px) {
    #main-scroller { overflow-x: hidden; }
}

/* Компактна лояльність для мобілки */
.loyalty-card-mobile {
    padding: 1rem !important;
    margin-bottom: 1rem !important;
}
.loyalty-card-mobile h3 { font-size: 1.25rem !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Стиль активної кнопки як на твоєму скріншоті */
        .nav-active {
            background: rgba(244, 63, 94, 0.1) !important;
            color: #f43f5e !important;
        }
        .nav-inactive {
            color: #52525b;
        }
        
        /* Щоб контент не стрибав */
        section { scroll-snap-align: center; }
        /* Контейнер для заголовка, щоб вони були на одній лінії */
.section-header-container {
    height: 80px; /* Фіксована висота для всіх заголовків */
    display: flex;
    flex-direction: column;
    justify-content: center;
    margin-bottom: 2rem; /* mb-8 */
}

/* Однаковий відступ для всіх секцій */
#main-scroller section {
    padding-top: 2rem !important; 
}
        #main-scroller {
    scroll-behavior: smooth;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch; /* для плавності на iPhone */
}
    </style>
</head>
<body class="flex min-h-screen">

 <!-- 1. SIDEBAR ДЛЯ КОМП'ЮТЕРІВ (Показується тільки на lg: 1024px+) -->
<aside class="hidden lg:flex fixed top-0 left-0 z-[100] w-64 h-full bg-black/40 border-r border-white/5 flex-col shadow-2xl">
    <div class="p-8">
        <h1 class="text-xl font-extrabold text-white tracking-tighter uppercase leading-none">Wella Glow</h1>
        <p class="text-[9px] text-rose-500 font-bold tracking-[0.4em] mt-1">studio</p>
    </div>
    <nav class="flex-1 px-4 space-y-2 mt-4">
        <button onclick="window.scrollToPage(0)" id="side-profile" class="w-full flex items-center gap-4 p-4 rounded-2xl transition-all duration-300 nav-inactive">
            <i class="fa-solid fa-circle-user"></i> <span class="text-xs uppercase font-black tracking-widest">Профіль</span>
        </button>
        <button onclick="window.scrollToPage(1)" id="side-booking" class="w-full flex items-center gap-4 p-4 rounded-2xl transition-all duration-300 nav-inactive">
            <i class="fa-solid fa-calendar-plus"></i> <span class="text-xs uppercase font-black tracking-widest">Запис</span>
        </button>
        <button onclick="window.scrollToPage(2)" id="side-bonuses" class="w-full flex items-center gap-4 p-4 rounded-2xl transition-all duration-300 nav-inactive">
            <i class="fa-solid fa-gift"></i> <span class="text-xs uppercase font-black tracking-widest">Бонуси</span>
        </button>
    </nav>
    <div class="p-8 border-t border-white/5">
        <button onclick="logout()" class="text-[10px] font-black uppercase text-zinc-600 hover:text-rose-500 transition">Вийти</button>
    </div>
</aside>

<!-- 2. TABBAR ДЛЯ ТЕЛЕФОНІВ (Приховується на lg: 1024px+) -->
<nav class="lg:hidden fixed bottom-4 left-4 right-4 h-16 glass-panel rounded-2xl flex items-center justify-around z-[100] border border-white/5 shadow-2xl">
    <button onclick="window.scrollToPage(0)" id="btn-profile" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300 nav-inactive">
        <i class="fa-solid fa-circle-user text-lg"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Профіль</span>
    </button>
    <button onclick="window.scrollToPage(1)" id="btn-booking" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300 nav-inactive">
        <i class="fa-solid fa-calendar-plus text-lg"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Запис</span>
    </button>
    <button onclick="window.scrollToPage(2)" id="btn-bonuses" class="flex flex-col items-center gap-1 w-20 py-2 rounded-xl transition-all duration-300 nav-inactive">
        <i class="fa-solid fa-gift text-lg"></i>
        <span class="text-[9px] font-black uppercase tracking-widest">Бонуси</span>
    </button>
</nav>

<!-- 3. ГОЛОВНИЙ КОНТЕЙНЕР -->
<main id="main-scroller" class="flex overflow-x-auto snap-x snap-mandatory no-scrollbar scroll-smooth h-screen ml-0 lg:ml-64">
    <!-- Секції залишаються w-screen на мобільних, але ми обмежимо контент всередині них для ПК -->
    <section class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-12 pb-32 overflow-y-auto" id="page-profile"></section>
    <section class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-12 pb-32 overflow-y-auto" id="page-booking"></section>
    <section class="w-screen lg:w-[calc(100vw-16rem)] flex-shrink-0 snap-center p-5 lg:p-12 pb-32 overflow-y-auto" id="page-bonuses"></section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/client-dashboard.js"></script>
</body>
</html>
