<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wella Glow | Вхід</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&display=swap');
        :root { --bg: #050505; --accent: #f43f5e; }
        body { font-family: 'Manrope', sans-serif; background-color: var(--bg); color: #e2e8f0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .glass-panel { background: rgba(17, 17, 19, 0.6); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neo-gradient { background: linear-gradient(135deg, #f43f5e 0%, #fb7185 100%); }
        .input-dark { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #e2e8f0; font-size: 13px; font-weight: 600; padding: 12px 16px; border-radius: 12px; outline: none; width: 100%; transition: all 0.3s; }
        .input-dark:focus { border-color: var(--accent); background: rgba(255, 255, 255, 0.05); box-shadow: 0 0 20px rgba(244, 63, 94, 0.1); }
        i, span, p, h1, h2, h3, h4, label, button, a, input { font-style: normal !important; }
    </style>
</head>
<body>

    <div class="max-w-md w-full p-6">
        <div class="text-center mb-10">
            <h1 class="text-3xl font-extrabold text-white tracking-tighter uppercase leading-none italic-none">Wella Glow</h1>
            <p class="text-[10px] text-rose-500 font-bold tracking-[0.4em] uppercase mt-2">Особистий кабінет</p>
        </div>

        <div class="glass-panel p-8 lg:p-10 rounded-[3rem] shadow-2xl relative overflow-hidden">
            <div class="mb-8 leading-none">
                <h3 class="text-xl font-black text-white uppercase tracking-tighter">З поверненням!</h3>
                <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-3">Введіть дані для входу</p>
            </div>

            <form id="loginForm" class="space-y-5" autocomplete="off">
                <div class="space-y-2">
                    <label class="text-[9px] text-zinc-500 uppercase font-black ml-1 tracking-widest">Номер телефону</label>
                    <input type="tel" id="loginPhone" placeholder="+38 (067) 000 00 00" class="input-dark" required>
                </div>

                <div class="space-y-2">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-[9px] text-zinc-500 uppercase font-black tracking-widest leading-none">Пароль</label>
                        <a href="#" class="text-[8px] text-zinc-600 font-bold uppercase hover:text-rose-500 transition">Забули?</a>
                    </div>
                    <input type="password" id="loginPassword" placeholder="••••••••" class="input-dark" required>
                </div>

                <button type="submit" class="neo-gradient w-full py-4 rounded-2xl text-[11px] font-black uppercase tracking-[0.3em] text-white shadow-xl shadow-rose-500/10 mt-4 transition active:scale-95">
                    Увійти в кабінет
                </button>

                <p class="text-[10px] text-zinc-600 text-center uppercase font-bold tracking-widest mt-6">
                    Немає акаунту? <a href="registration.html" class="text-rose-500 hover:underline">Зареєструватись</a>
                </p>
            </form>
        </div>
    </div>

    <!-- SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-init.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
